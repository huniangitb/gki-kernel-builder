# ============================================================
# 通用内核编译工作流
# 基于 DroidSpaces 工作流修改，去除硬编码配置，可灵活适配
# 任意 GKI 内核源码仓库 + 自定义补丁 + 自定义工具链
# ============================================================
name: Build Kernel

env:
  TZ: Asia/Shanghai
  # 默认内核源码配置（可在 workflow_dispatch 中覆盖）
  KERNEL_REPO: 'Star-ZER0/android_gki_kernel_5.10_common'
  KERNEL_BRANCH: 'android12-5.10-2026-04_r1'
  KERNEL_VERSION: '5.10.252'

'on':
  workflow_dispatch:
    inputs:
      # ---------- 内核源码 ----------
      kernel_repo:
        description: '内核源码仓库 (owner/repo)'
        required: true
        type: string
        default: 'Star-ZER0/android_gki_kernel_5.10_common'
      kernel_branch:
        description: '内核源码分支'
        required: true
        type: string
        default: 'android12-5.10-2026-04_r1'
      kernel_version:
        description: '内核版本号 (用于打包命名)'
        required: true
        type: string
        default: '5.10.252'

      # ---------- 工具链 ----------
      clang_download_url:
        description: 'Clang 工具链下载 URL (.tar.gz 或 .tar.zst)'
        required: false
        type: string
        default: 'https://github.com/huniangitb/Clang-r584948b/releases/download/v1.0.0/linux-x86-kernel-clang-r584948b.tar.gz'
      clang_dir_name:
        description: 'Clang 解压后目录名'
        required: false
        type: string
        default: 'clang-r584948b'

      # ---------- 补丁 ----------
      patch_urls:
        description: '补丁 URL 列表，每行一个 (留空则不应用补丁)'
        required: false
        type: string
        default: ''

      # ---------- 内核后缀 ----------
      kernel_suffix:
        description: '内核名称后缀 (留空则使用默认)'
        required: false
        type: string
        default: ''

      # ---------- 构建环境 ----------
      workspace_tarball_url:
        description: '预打包构建环境 tarball URL (.tar.zst)，包含 build/build.sh 等基础设施'
        required: false
        type: string
        default: 'https://github.com/huniangitb/Clang-r584948b/releases/download/v1.0.0/common-android12-5.10.tar.zst'
      build_config:
        description: 'GKI 构建配置文件 (相对于 kernel 目录)'
        required: false
        type: string
        default: 'common/build.config.gki.aarch64'
      lto_mode:
        description: 'LTO 模式 (thin / full / none)'
        required: false
        type: string
        default: 'thin'
      ccache_enable:
        description: '启用 ccache 加速 (true / false)'
        required: false
        type: string
        default: 'false'

      # ---------- AnyKernel3 ----------
      anykernel3_enable:
        description: '打包 AnyKernel3 刷机包 (true / false)'
        required: false
        type: string
        default: 'true'

      # ---------- Release ----------
      create_release:
        description: '创建 GitHub Release (true / false)'
        required: false
        type: string
        default: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 最大化构建空间
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-mb: 8192
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: 安装基础依赖
        run: |
          sudo apt update
          sudo apt install -y curl bison flex make binutils dwarves git lld zip perl \
            gcc python3 python-is-python3 bc libssl-dev libelf-dev abigail-tools \
            coreutils zstd
          sudo ln -sf /usr/bin/dd /bin/dd 2>/dev/null || true

      - name: 导出输入变量为环境变量
        run: |
          # 将所有 workflow_dispatch 输入导出为环境变量
          # 后续步骤可通过 $KERNEL_REPO、$KERNEL_BRANCH 等直接引用
          cat >> $GITHUB_ENV << 'ENVEOF'
          KERNEL_REPO=${{ github.event.inputs.kernel_repo }}
          KERNEL_BRANCH=${{ github.event.inputs.kernel_branch }}
          KERNEL_VERSION=${{ github.event.inputs.kernel_version }}
          CLANG_DOWNLOAD_URL=${{ github.event.inputs.clang_download_url }}
          CLANG_DIR_NAME=${{ github.event.inputs.clang_dir_name }}
          PATCH_URLS=${{ github.event.inputs.patch_urls }}
          KERNEL_SUFFIX=${{ github.event.inputs.kernel_suffix }}
          WORKSPACE_TARBALL_URL=${{ github.event.inputs.workspace_tarball_url }}
          BUILD_CONFIG=${{ github.event.inputs.build_config }}
          LTO_MODE=${{ github.event.inputs.lto_mode }}
          CCACHE_ENABLE=${{ github.event.inputs.ccache_enable }}
          ANY_KERNEL3=${{ github.event.inputs.anykernel3_enable }}
          CREATE_RELEASE=${{ github.event.inputs.create_release }}
          ENVEOF

      - name: 初始化源码仓库
        run: |
          rm -rf kernel_workspace && mkdir kernel_workspace && cd kernel_workspace
          wget -q -c --show-progress --timeout=30 --tries=30 \
            ${{ env.WORKSPACE_TARBALL_URL }} \
            -O common-android12-5.10.tar.zst
          tar -I zstd -xf common-android12-5.10.tar.zst
          rm -rf common 2>/dev/null || true
          git clone --depth=1 https://github.com/${{ env.KERNEL_REPO }} common -b ${{ env.KERNEL_BRANCH }}
          rm common/android/abi_gki_protected_exports_* 2>/dev/null || true

      - name: 下载并应用必需补丁
        run: |
          cd kernel_workspace
          if [ -z "${{ env.PATCH_URLS }}" ]; then
            echo "未提供补丁，跳过"
            exit 0
          fi

          mkdir -p patches
          idx=1
          echo "${{ env.PATCH_URLS }}" | while IFS= read -r url; do
            [ -z "$url" ] && continue
            # 跳过注释行（以 # 开头）
            case "$url" in \#*) continue ;; esac

            patch_file="patches/$(printf '%03d' $idx)-$(basename "$url")"
            echo "下载补丁 [$idx]: $url"
            wget -q --timeout=30 --tries=5 -O "$patch_file" "$url" || {
              echo "警告: 补丁 $idx 下载失败，跳过"
              continue
            }
            idx=$((idx + 1))
          done

          # 应用补丁到内核源码
          cd common
          for p in ../patches/*.patch; do
            [ -f "$p" ] || continue
            echo "应用补丁: $p"
            patch -p1 < "$p" && echo "  ✓ 成功" || echo "  ✗ 失败"
          done

      - name: 下载并安装 Clang 工具链
        run: |
          cd kernel_workspace
          if [ -z "${{ env.CLANG_DOWNLOAD_URL }}" ]; then
            echo "未提供 Clang 下载地址，跳过"
            exit 0
          fi

          mkdir -p "prebuilts-master/clang/host/linux-x86/${{ env.CLANG_DIR_NAME }}"
          ARCHIVE_NAME="clang-archive.${CLANG_DOWNLOAD_URL##*.}"

          echo "下载 Clang: ${{ env.CLANG_DOWNLOAD_URL }}"
          wget -q --timeout=30 --tries=10 -O "$ARCHIVE_NAME" "${{ env.CLANG_DOWNLOAD_URL }}"

          echo "解压 Clang..."
          case "$ARCHIVE_NAME" in
            *.zst) tar -I zstd -xf "$ARCHIVE_NAME" -C "prebuilts-master/clang/host/linux-x86/${{ env.CLANG_DIR_NAME }}" ;;
            *.gz)  tar -xzf "$ARCHIVE_NAME" -C "prebuilts-master/clang/host/linux-x86/${{ env.CLANG_DIR_NAME }}" ;;
            *.xz)  tar -xJf "$ARCHIVE_NAME" -C "prebuilts-master/clang/host/linux-x86/${{ env.CLANG_DIR_NAME }}" ;;
            *.bz2) tar -xjf "$ARCHIVE_NAME" -C "prebuilts-master/clang/host/linux-x86/${{ env.CLANG_DIR_NAME }}" ;;
            *)     echo "警告: 未知压缩格式，尝试 tar"; tar -xf "$ARCHIVE_NAME" -C "prebuilts-master/clang/host/linux-x86/${{ env.CLANG_DIR_NAME }}" ;;
          esac

          # 验证
          CLANG_BIN="prebuilts-master/clang/host/linux-x86/${{ env.CLANG_DIR_NAME }}/bin/clang"
          if [ -f "$CLANG_BIN" ]; then
            echo "Clang 安装成功:"
            $CLANG_BIN --version
          else
            echo "错误: 未找到 clang 二进制文件"
            echo "搜索所有可能的 clang 路径..."
            find "prebuilts-master/clang/host/linux-x86/${{ env.CLANG_DIR_NAME }}" -name clang -type f 2>/dev/null
            exit 1
          fi

      - name: 添加内核名称后缀
        run: |
          cd kernel_workspace
          SUFFIX="${{ env.KERNEL_SUFFIX }}"
          if [ -z "$SUFFIX" ]; then
            echo "未指定内核后缀，跳过修改"
            exit 0
          fi

          echo "内核名称后缀: $SUFFIX"

          for f in common/scripts/setlocalversion; do
            [ -f "$f" ] || continue
            # 将默认输出的 res 替换为自定义后缀
            if grep -q 'echo "\$res"' "$f"; then
              sed -i "\$s|echo \"\$res\"|echo \"-${SUFFIX}\"|" "$f"
            else
              # 如果原文件没有标准 echo $res，尝试追加
              echo "警告: setlocalversion 格式不标准，在文件末尾追加"
              echo "echo \"-${SUFFIX}\"" >> "$f"
            fi
          done

      - name: 配置构建环境
        run: |
          cd kernel_workspace

          # 替换 Clang 路径
          CLANG_REL_PATH="prebuilts-master/clang/host/linux-x86/${{ env.CLANG_DIR_NAME }}/bin"
          if [ -f common/build.config.common ]; then
            sed -i "s|CLANG_PREBUILT_BIN=.*|CLANG_PREBUILT_BIN=$CLANG_REL_PATH|" common/build.config.common
          fi
          if [ -f common/build.config.gki ]; then
            # 移除 check_defconfig 检查（自定义内核不需要）
            sed -i 's/check_defconfig//' common/build.config.gki
          fi

          # 配置 ccache
          if [ "${{ env.CCACHE_ENABLE }}" = "true" ]; then
            sudo apt install -y ccache
            echo "ccache 已安装"
          fi

          echo "构建配置摘要:"
          if [ -f common/build.config.common ]; then
            grep -E "CROSS_COMPILE|CLANG_PREBUILT_BIN|CC|LD" common/build.config.common || true
          fi

      - name: 恢复堆栈保护相关配置
        run: |
          cd kernel_workspace
          DEFCONFIG_PATH="common/arch/arm64/configs/gki_defconfig"
          echo "===== 修改前配置关键项 ====="
          grep -E "CONFIG_STACKPROTECTOR|CONFIG_STACKPROTECTOR_STRONG" "$DEFCONFIG_PATH" || echo "未找到相关项"

          echo -e "\n# Stack protector options" >> "$DEFCONFIG_PATH"
          echo "CONFIG_STACKPROTECTOR=y" >> "$DEFCONFIG_PATH"
          echo "CONFIG_STACKPROTECTOR_STRONG=y" >> "$DEFCONFIG_PATH"

          echo "===== 修改后配置关键项 ====="
          grep -E "CONFIG_STACKPROTECTOR|CONFIG_STACKPROTECTOR_STRONG" "$DEFCONFIG_PATH"

      - name: 构建内核
        run: |
          cd kernel_workspace
          LTO=${{ env.LTO_MODE }} \
          BUILD_CONFIG=${{ env.BUILD_CONFIG }} \
            build/build.sh

      - name: 收集构建产物
        run: |
          cd kernel_workspace
          mkdir -p build_artifacts

          # 内核镜像
          IMAGE_FILE=$(find out -name Image -type f 2>/dev/null | head -n1)
          if [ -n "$IMAGE_FILE" ]; then
            cp "$IMAGE_FILE" build_artifacts/
            echo "内核镜像: $IMAGE_FILE ($(du -h "$IMAGE_FILE" | cut -f1))"
          else
            echo "警告: 未找到 Image"
          fi

          # .config
          CONFIG_FILE="out/android12-5.10/common/.config"
          [ -f "$CONFIG_FILE" ] && cp "$CONFIG_FILE" build_artifacts/config

          # 模块符号
          MODULE_SYMVERS="out/android12-5.10/common/Module.symvers"
          [ -f "$MODULE_SYMVERS" ] && cp "$MODULE_SYMVERS" build_artifacts/

          # ABI 符号列表
          ABI_SYMLIST="out/android12-5.10/common/abi_symbollist.raw"
          [ -f "$ABI_SYMLIST" ] && cp "$ABI_SYMLIST" build_artifacts/

          echo "构建产物列表:"
          ls -la build_artifacts/

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: Kernel_Build_Artifacts
          path: kernel_workspace/build_artifacts/

      - name: 打包 AnyKernel3 刷机包
        if: ${{ env.ANY_KERNEL3 == 'true' }}
        run: |
          cd kernel_workspace

          # 从编译产物中获取实际内核版本（如 5.10.252）
          cd common
          REAL_VERSION=$(make -s kernelversion 2>/dev/null || echo "${{ env.KERNEL_VERSION }}")
          cd ..
          echo "实际内核版本: ${REAL_VERSION}"

          # 导出供后续 release job 使用
          echo "REAL_VERSION=${REAL_VERSION}" >> $GITHUB_ENV

          # 使用仓库本地的 AnyKernel3（来自 WildKernels/AnyKernel3 gki-2.0）
          cp -r ${{ github.workspace }}/AnyKernel3 .

          # 复制内核镜像
          IMAGE_FILE=$(find . -name Image -type f | head -n1)
          if [ -n "$IMAGE_FILE" ]; then
            cp "$IMAGE_FILE" AnyKernel3/
            echo "已复制镜像: $IMAGE_FILE"
          else
            echo "错误: 未找到 Image，跳过打包"
            exit 1
          fi

          # 写入实际版本信息
          echo "${REAL_VERSION}" > AnyKernel3/kernel_version.txt

          cd AnyKernel3
          ZIPNAME="AnyKernel3_${REAL_VERSION}.zip"
          zip -r "../${ZIPNAME}" ./*
          echo "刷机包打包完成: ${ZIPNAME}"

      - name: 上传刷机包
        if: ${{ env.ANY_KERNEL3 == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: Kernel_ZIP
          path: kernel_workspace/*.zip

  release:
    needs: build
    if: ${{ github.event.inputs.create_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: read

    steps:
      - name: 下载刷机包
        uses: actions/download-artifact@v4
        with:
          name: Kernel_ZIP
          path: ./release_zips

      - name: 准备 Release 信息
        id: vars
        run: |
          ZIP_FILE=$(ls ./release_zips/*.zip 2>/dev/null | head -n1)
          if [ -z "$ZIP_FILE" ]; then
            echo "未找到 ZIP，使用默认版本号"
            KERNEL_VER="${{ env.KERNEL_VERSION }}"
          else
            KERNEL_VER=$(unzip -p "$ZIP_FILE" kernel_version.txt 2>/dev/null || echo "${{ env.KERNEL_VERSION }}")
          fi

          TIME_FORM="$(date +'%Y-%m-%d %H:%M:%S')"
          TAG_NAME="${KERNEL_VER}-$(date +'%y%m%d%H%M%S')"

          echo "FULL_VERSION=${KERNEL_VER}" >> $GITHUB_ENV
          echo "TIME_FORM=${TIME_FORM}" >> $GITHUB_ENV
          echo "TAG_NAME=${TAG_NAME}" >> $GITHUB_ENV

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "Kernel ${{ env.FULL_VERSION }}"
          body: |
            Auto-built kernel
            Version: ${{ env.FULL_VERSION }}
            Repo: ${{ env.KERNEL_REPO }} @ ${{ env.KERNEL_BRANCH }}
            Build time: ${{ env.TIME_FORM }}
          files: ./release_zips/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
